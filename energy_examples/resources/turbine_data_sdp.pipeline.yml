# The main pipeline for energy_examples

resources:
  pipelines:
    turbine_data_sdp:
      name: turbine_data_sdp
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/turbine_data_sdp"

      libraries:
        - glob:
            include: ../src/turbine_data_sdp/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
