# This is a Databricks asset bundle definition for energy_examples.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: energy_examples
  uuid: 79618077-27d7-403a-bc86-fa4d4380cee0

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-b9ba7b98-bdfd.cloud.databricks.com
    variables:
      catalog: dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-b9ba7b98-bdfd.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ben.matthews@foilai.co.uk to make sure we only have a single copy.
      root_path: /Workspace/Users/ben.matthews@foilai.co.uk/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev
      schema: prod
    permissions:
      - user_name: ben.matthews@foilai.co.uk
        level: CAN_MANAGE
